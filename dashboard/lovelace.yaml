# Lovelace Dashboard - Rodinný dům
# Styl: glassmorphism (priklad-projektu-1) + layout (priklad-projektu-2)
# Nahraj přes: Nastavení → Dashboardy → přidat → Raw config editor

# ============================================================
# BUTTON CARD TEMPLATES
# ============================================================
button_card_templates:
  mistnost_karta:
    variables:
      var_name: Místnost
      var_navigate: "#"
      var_sensor_svetla: false
      var_sensor_teplota: false
      var_sensor_komfort: false
      var_sensor_standby: false
      var_sensor_noc: false
      var_klima: false
      var_sensor_okna: false
    triggers_update: all
    show_icon: false
    extra_styles: |
      [[[
        const svetlo_on = variables.var_sensor_svetla && states[variables.var_sensor_svetla]?.state === 'on';
        return `ha-card {
          background: var(--mik-card-bg) !important;
          backdrop-filter: blur(10px) saturate(1.2);
          -webkit-backdrop-filter: blur(10px) saturate(1.2);
          border: 0.5px solid ${svetlo_on ? 'rgba(255,193,7,0.45)' : 'rgba(255,255,255,0.12)'};
          border-radius: 18px;
          box-shadow: ${svetlo_on ? '0 0 20px rgba(255,193,7,0.12)' : 'var(--mik-card-shadow)'};
        }`;
      ]]]
    tap_action:
      action: navigate
      navigation_path: "[[[ return '/muj-dum/domov' + variables.var_navigate ]]]"
    name: |
      [[[
        const on = variables.var_sensor_svetla && states[variables.var_sensor_svetla]?.state === 'on';
        const icoColor = on ? 'var(--mik-color-svetlo)' : 'var(--mik-btn-icon)';
        return `<ha-icon icon="mdi:lightbulb" style="width:18px;color:${icoColor};vertical-align:middle;margin-right:5px;margin-top:-5px"></ha-icon>${variables.var_name}<ha-icon icon="mdi:chevron-right" style="width:26px;position:absolute;top:-2px;right:10px;color:rgba(234,235,238,0.35)"></ha-icon>`;
      ]]]
    custom_fields:
      teplota: |
        [[[
          if (!variables.var_sensor_teplota) return '';
          const t = states[variables.var_sensor_teplota]?.state;
          if (!t || t === 'unknown' || t === 'unavailable') return '';
          return `<span style="font-size:22px;font-weight:700;color:var(--mik-text-primary)">${parseFloat(t).toFixed(1)}<small style="font-size:50%;font-weight:400;color:var(--mik-text-muted)"> °C</small></span>`;
        ]]]
      termostat: |
        [[[
          const winOpen = variables.var_sensor_okna && variables.var_sensor_okna.split(',').some(id => states[id.trim()]?.state === 'off');
          const winIcon = winOpen ? `<ha-icon icon="mdi:window-open" style="width:16px;color:var(--mik-color-alarm);vertical-align:middle"></ha-icon>` : '';
          const chlazeni = variables.var_klima && states[variables.var_klima]?.state === 'on';
          const snow = chlazeni ? `<ha-icon icon="mdi:snowflake" style="width:16px;color:var(--mik-color-klima);vertical-align:middle"></ha-icon>` : '';
          let modeIcon = '';
          if (variables.var_sensor_komfort) {
            if (states[variables.var_sensor_komfort]?.state === 'on')
              modeIcon = `<ha-icon icon="mdi:home-account" style="width:20px;color:var(--mik-color-komfort);vertical-align:middle"></ha-icon>`;
            else if (states[variables.var_sensor_standby]?.state === 'on')
              modeIcon = `<ha-icon icon="mdi:home-outline" style="width:20px;color:var(--mik-color-standby);vertical-align:middle"></ha-icon>`;
            else if (states[variables.var_sensor_noc]?.state === 'on')
              modeIcon = `<ha-icon icon="mdi:weather-night" style="width:20px;color:var(--mik-color-utlum);vertical-align:middle"></ha-icon>`;
          }
          return winIcon + snow + modeIcon;
        ]]]
    styles:
      card:
        - height: 88px
        - padding: 10px 16px 10px 12px
        - cursor: pointer
      name:
        - position: absolute
        - top: 10px
        - left: 12px
        - font-size: 15px
        - font-weight: 600
        - color: var(--mik-text-primary)
        - width: calc(100% - 20px)
        - text-align: left
      grid:
        - grid-template-areas: "\". .\" \"teplota termostat\""
        - grid-template-columns: 1fr 60px
        - grid-template-rows: 1fr auto
        - align-items: end
      custom_fields:
        teplota:
          - text-align: left
          - padding-left: 3px
        termostat:
          - text-align: right
  svetlo_btn:
    variables:
      entity: light.svetlo_hala
      name: Světlo
      icon: mdi:lightbulb
    triggers_update:
      - "[[[ return variables.entity; ]]]"
    extra_styles: |
      [[[
        const on = states[variables.entity]?.state === 'on';
        return `ha-card {
          background: ${on ? 'var(--mik-color-svetlo-bg)' : 'var(--mik-btn-bg)'};
          border: 0.5px solid ${on ? 'var(--mik-color-svetlo-border)' : 'rgba(255,255,255,0.1)'};
          border-radius: 14px;
          box-shadow: ${on ? '0 0 12px rgba(255,193,7,0.1)' : 'none'};
        }`;
      ]]]
    tap_action:
      action: call-service
      service: light.toggle
      service_data:
        entity_id: "[[[ return variables.entity ]]]"
    custom_fields:
      ico: |
        [[[
          const on = states[variables.entity]?.state === 'on';
          return `<ha-icon icon="${variables.icon}"
            style="width:20px;color:${on ? 'var(--mik-color-svetlo)' : 'var(--mik-btn-icon)'}">
          </ha-icon>`;
        ]]]
      lbl: "[[[ return variables.name ]]]"
    styles:
      card:
        - padding: 8px 10px
        - height: 50px
      grid:
        - grid-template-areas: "\"ico lbl\""
        - grid-template-columns: 30px 1fr
        - grid-template-rows: 1fr
        - align-items: center
      custom_fields:
        lbl:
          - font-size: 13px
          - color: var(--mik-text-secondary)
          - text-align: left
  okno_btn:
    variables:
      entity: binary_sensor.okno_obyvak
      name: Okno
    triggers_update:
      - "[[[ return variables.entity; ]]]"
    show_icon: false
    tap_action:
      action: none
    hold_action:
      action: none
    double_tap_action:
      action: none
    extra_styles: |
      [[[
        return `ha-card {
          background: var(--mik-btn-bg);
          border: 0.5px solid rgba(255,255,255,0.10);
          border-radius: 14px;
          cursor: default !important;
        }
        mwc-ripple { display: none !important; }
        ha-card:hover { opacity: 1 !important; }`;
      ]]]
    custom_fields:
      ico: |
        [[[
          const open = states[variables.entity]?.state === 'off';
          return `<ha-icon icon="${open ? 'mdi:window-open' : 'mdi:window-closed-variant'}"
            style="width:20px;color:${open ? 'var(--mik-color-alarm)' : 'var(--mik-color-komfort)'}">
          </ha-icon>`;
        ]]]
      lbl: "[[[ return variables.name ]]]"
    styles:
      card:
        - padding: 8px 10px
        - height: 50px
      grid:
        - grid-template-areas: "\"ico lbl\""
        - grid-template-columns: 30px 1fr
        - grid-template-rows: 1fr
        - align-items: center
      custom_fields:
        lbl:
          - font-size: 13px
          - color: var(--mik-text-secondary)
          - text-align: left
  rezim_btn:
    variables:
      entity: switch.rezim_topeni_dp1
      name: Topení
      icon: mdi:radiator
      active_state: "on"
      color_on: var(--mik-color-alarm)
    triggers_update:
      - "[[[ return variables.entity; ]]]"
    show_icon: false
    tap_action:
      action: call-service
      service: >-
        [[[ return variables.active_state === 'on' ? 'switch.turn_on' :
        'switch.turn_off' ]]]
      service_data:
        entity_id: "[[[ return variables.entity ]]]"
    custom_fields:
      ico: |
        [[[
          const active = states[variables.entity]?.state === variables.active_state;
          return `<ha-icon icon="${variables.icon}"
            style="width:28px;color:${active ? variables.color_on : 'var(--mik-btn-icon)'}">
          </ha-icon>`;
        ]]]
      lbl: "[[[ return variables.name ]]]"
    styles:
      card:
        - padding: 10px
        - background: |
            [[[
              const active = states[variables.entity]?.state === variables.active_state;
              return active ? 'var(--mik-btn-bg-active)' : 'var(--mik-btn-bg)';
            ]]]
        - border: |
            [[[
              const active = states[variables.entity]?.state === variables.active_state;
              return active ? 'var(--mik-btn-border-active)' : 'var(--mik-btn-border)';
            ]]]
        - border-radius: 14px
        - transition: background 0.2s
      grid:
        - grid-template-areas: "\"ico\" \"lbl\""
        - grid-template-columns: 1fr
        - grid-template-rows: auto auto
        - justify-items: center
        - gap: 4px
      custom_fields:
        ico:
          - text-align: center
        lbl:
          - font-size: 12px
          - color: var(--mik-btn-text)
          - text-align: center
  topeni_mode_btn:
    variables:
      entity: switch.topeni_komfort_obyvak
      name: Komfort
      icon: mdi:home-account
      color_on: var(--mik-color-komfort)
    triggers_update:
      - "[[[ return variables.entity; ]]]"
    tap_action:
      action: call-service
      service: switch.turn_on
      service_data:
        entity_id: "[[[ return variables.entity ]]]"
    custom_fields:
      ico: |
        [[[
          const on = states[variables.entity]?.state === 'on';
          return `<ha-icon icon="${variables.icon}"
            style="width:28px;color:${on ? variables.color_on : 'var(--mik-btn-icon)'}">
          </ha-icon>`;
        ]]]
      lbl: "[[[ return variables.name ]]]"
    styles:
      card:
        - padding: 10px
        - background: |
            [[[
              const on = states[variables.entity]?.state === 'on';
              return on ? 'var(--mik-btn-bg-active)' : 'var(--mik-btn-bg)';
            ]]]
        - border: |
            [[[
              const on = states[variables.entity]?.state === 'on';
              return on ? 'var(--mik-btn-border-active)' : 'var(--mik-btn-border)';
            ]]]
        - border-radius: 14px
        - transition: background 0.2s
      grid:
        - grid-template-areas: "\"ico\" \"lbl\""
        - grid-template-columns: 1fr
        - grid-template-rows: auto auto
        - justify-items: center
        - gap: 4px
      custom_fields:
        ico:
          - text-align: center
        lbl:
          - font-size: 12px
          - color: >-
              [[[ return states[variables.entity]?.state === 'on' ?
              'var(--mik-btn-text-active)' : 'var(--mik-btn-text)' ]]]
          - text-align: center
  plan_btn:
    variables:
      entity: input_select.topeni_plan_obyvak
      plan: Ruční
      icon: mdi:hand-back-right
      color_on: var(--mik-btn-text-active)
    triggers_update:
      - "[[[ return variables.entity; ]]]"
    show_icon: false
    tap_action:
      action: call-service
      service: input_select.select_option
      service_data:
        entity_id: "[[[ return variables.entity ]]]"
        option: "[[[ return variables.plan ]]]"
    custom_fields:
      ico: |
        [[[
          const active = states[variables.entity]?.state === variables.plan;
          return `<ha-icon icon="${variables.icon}"
            style="width:24px;color:${active ? variables.color_on : 'var(--mik-btn-icon)'}">
          </ha-icon>`;
        ]]]
      lbl: "[[[ return variables.plan ]]]"
    styles:
      card:
        - padding: 8px
        - background: |
            [[[
              const active = states[variables.entity]?.state === variables.plan;
              return active ? 'var(--mik-btn-bg-active)' : 'var(--mik-btn-bg)';
            ]]]
        - border: |
            [[[
              const active = states[variables.entity]?.state === variables.plan;
              return active ? 'var(--mik-btn-border-active)' : 'var(--mik-btn-border)';
            ]]]
        - border-radius: 12px
        - transition: background 0.2s
      grid:
        - grid-template-areas: "\"ico\" \"lbl\""
        - grid-template-columns: 1fr
        - grid-template-rows: auto auto
        - justify-items: center
        - gap: 3px
      custom_fields:
        ico:
          - text-align: center
        lbl:
          - font-size: 11px
          - color: >-
              [[[ return states[variables.entity]?.state === variables.plan ?
              'var(--mik-btn-text-active)' : 'var(--mik-btn-text)' ]]]
          - text-align: center
  schedule_link_btn:
    variables:
      entity: schedule.topeni_obyvak
      name: Vlastní
    entity: "[[[ return variables.entity ]]]"
    show_icon: false
    tap_action:
      action: more-info
    custom_fields:
      ico: |
        [[[
          return `<ha-icon icon="mdi:cog" style="width:18px;color:var(--mik-btn-icon)"></ha-icon>`;
        ]]]
      lbl: "[[[ return variables.name ]]]"
    styles:
      card:
        - padding: 10px 8px
        - background: var(--mik-btn-bg)
        - border: var(--mik-btn-border)
        - border-radius: 12px
      grid:
        - grid-template-areas: "\"ico lbl\""
        - grid-template-columns: 26px 1fr
        - align-items: center
      custom_fields:
        ico:
          - text-align: center
        lbl:
          - font-size: 12px
          - color: var(--mik-btn-text)
          - text-align: left
  ventilace_btn:
    variables:
      entity: switch.ventilace_sklep
      name: Ventilátor
    entity: "[[[ return variables.entity ]]]"
    show_name: false
    show_icon: false
    tap_action:
      action: toggle
    extra_styles: |
      [[[
        const on = states[variables.entity]?.state === 'on';
        return `@keyframes rotating { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        ha-card {
          background: ${on ? 'var(--mik-color-ventilace-bg)' : 'var(--mik-btn-bg)'};
          border: 0.5px solid ${on ? 'var(--mik-color-ventilace-border)' : 'var(--mik-btn-border, rgba(255,255,255,0.1))'};
          border-radius: 12px;
        }`;
      ]]]
    custom_fields:
      ico: |
        [[[
          const on = states[variables.entity]?.state === 'on';
          return `<div style="width:22px;height:22px;display:flex;align-items:center;justify-content:center;line-height:0;${on ? 'animation:rotating 1.5s linear infinite;transform-origin:50% 50%' : ''}">
            <ha-icon icon="mdi:fan" style="--mdc-icon-size:20px;color:${on ? 'var(--mik-color-komfort)' : 'var(--mik-text-muted)'}"></ha-icon>
          </div>`;
        ]]]
      lbl: "[[[ return variables.name ]]]"
    styles:
      card:
        - height: 64px
        - padding: 10px 12px
      grid:
        - grid-template-areas: "\"ico lbl\""
        - grid-template-columns: 34px 1fr
        - align-items: center
      custom_fields:
        lbl:
          - font-size: 14px
          - color: var(--mik-text-secondary)
          - text-align: left
views:
  - title: Domov
    path: domov
    icon: mdi:home
    type: sections
    max_columns: 3
    sections:
      - type: grid
        column_span: 1
        cards:
          - type: custom:button-card
            show_name: false
            show_icon: false
            card_mod:
              style: |
                ha-card {
                  background: transparent !important;
                  box-shadow: none !important;
                  border: none !important;
                }
                ha-card::before {
                  content: none !important;
                }
            extra_styles: |
              ha-card {
                background: transparent !important;
                --ha-card-background: transparent !important;
                border: none !important;
                box-shadow: none !important;
                backdrop-filter: none !important;
                -webkit-backdrop-filter: none !important;
              }
            custom_fields:
              cas: |
                [[[
                  const now = new Date();
                  const cas = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
                  return `<div style="font-size:64px;font-weight:700;letter-spacing:-2px;color:var(--mik-text-primary);line-height:1">${cas}</div>`;
                ]]]
              datum: |
                [[[
                  const dny = ['Neděle','Pondělí','Úterý','Středa','Čtvrtek','Pátek','Sobota'];
                  const mesice = ['ledna','února','března','dubna','května','června','července','srpna','září','října','listopadu','prosince'];
                  const now = new Date();
                  return `<div style="font-size:19px;font-weight:500;color:var(--mik-text-secondary)">${dny[now.getDay()]} ${now.getDate()}. ${mesice[now.getMonth()]}</div>`;
                ]]]
            styles:
              card:
                - padding: 18px 20px 14px
              grid:
                - grid-template-areas: "\"cas\" \"datum\""
                - grid-template-columns: 1fr
                - grid-template-rows: auto auto
                - gap: 4px
              custom_fields:
                cas:
                  - text-align: center
                datum:
                  - text-align: center
            grid_options:
              columns: 12
              rows: auto
          - type: horizontal-stack
            card_mod:
              style: |
                ha-card {
                  background: transparent !important;
                  box-shadow: none !important;
                  border: none !important;
                }
                ha-card::before {
                  content: none !important;
                }
            cards:
              - type: custom:button-card
                entity: sensor.sun_next_setting
                icon: mdi:thermometer
                show_icon: true
                show_name: true
                name: >
                  [[[ return (states['sensor.teplota_venku']?.state ?? '--') + '
                  °C' ]]]
                show_label: true
                label: Venkovní
                size: 55%
                card_mod:
                  style: |
                    ha-card {
                      background: transparent !important;
                      box-shadow: none !important;
                      border: none !important;
                    }
                    ha-card::before {
                      content: none !important;
                    }
                extra_styles: |
                  ha-card {
                    background: transparent !important;
                    --ha-card-background: transparent !important;
                    border: none !important;
                    box-shadow: none !important;
                    backdrop-filter: none !important;
                    -webkit-backdrop-filter: none !important;
                  }
                styles:
                  card:
                    - padding: 10px 14px
                    - height: 100px
                  icon:
                    - color: var(--mik-color-utlum)
                  name:
                    - font-size: 30px
                    - color: var(--mik-text-primary)
                    - line-height: "1"
                  label:
                    - font-size: 11px
                    - color: var(--mik-text-muted)
                    - margin-top: "-2px"
                  grid:
                    - grid-template-areas: "\"i n\" \"i l\""
                    - grid-template-columns: 65px 1fr
                    - grid-template-rows: auto auto
                    - gap: 2px
              - type: custom:button-card
                icon: mdi:thermometer
                show_icon: true
                show_name: true
                name: >
                  [[[ return (states['sensor.teplota_sklep']?.state ?? '--') + '
                  °C' ]]]
                show_label: true
                label: Sklep
                size: 55%
                card_mod:
                  style: |
                    ha-card {
                      background: transparent !important;
                      box-shadow: none !important;
                      border: none !important;
                    }
                    ha-card::before {
                      content: none !important;
                    }
                extra_styles: |
                  ha-card {
                    background: transparent !important;
                    --ha-card-background: transparent !important;
                    border: none !important;
                    box-shadow: none !important;
                    backdrop-filter: none !important;
                    -webkit-backdrop-filter: none !important;
                  }
                styles:
                  card:
                    - padding: 10px 14px
                    - height: 100px
                  icon:
                    - color: var(--mik-color-utlum)
                  name:
                    - font-size: 30px
                    - color: var(--mik-text-primary)
                    - line-height: "1"
                  label:
                    - font-size: 11px
                    - color: var(--mik-text-muted)
                    - margin-top: "-2px"
                  grid:
                    - grid-template-areas: "\"i n\" \"i l\""
                    - grid-template-columns: 65px 1fr
                    - grid-template-rows: auto auto
                    - gap: 2px
            grid_options:
              columns: 12
              rows: auto
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                entity: switch.topeni_komfort_obyvak
                show_name: false
                show_icon: false
                tap_action:
                  action: navigate
                  navigation_path: /muj-dum/domov#popup-topeni
                extra_styles: |
                  ha-card {
                    background: rgba(255,255,255,0.01);
                    backdrop-filter: blur(10px) saturate(1.2);
                    -webkit-backdrop-filter: blur(10px) saturate(1.2);
                    border: var(--mik-card-border);
                    border-radius: 14px;
                    box-shadow: var(--mik-card-shadow);
                  }
                custom_fields:
                  ico: |
                    [[[
                      return `<ha-icon icon="mdi:radiator"
                        style="width:20px;color:var(--mik-color-alarm)"></ha-icon>`;
                    ]]]
                  lbl: Topení
                styles:
                  card:
                    - height: 50px
                    - padding-left: 12px
                  grid:
                    - grid-template-areas: "\"ico lbl\""
                    - grid-template-columns: 30px 1fr
                    - align-items: center
                  custom_fields:
                    lbl:
                      - font-size: 14px
                      - color: var(--mik-text-secondary)
                      - text-align: left
              - type: custom:button-card
                entity: switch.ventilace_sklep
                show_name: false
                show_icon: false
                tap_action:
                  action: navigate
                  navigation_path: /muj-dum/domov#popup-ventilace
                extra_styles: |
                  [[[
                    const on = states['switch.ventilace_sklep']?.state === 'on';
                    return `@keyframes rotating { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
                    ha-card {
                      background: rgba(255,255,255,0.01);
                      backdrop-filter: blur(10px) saturate(1.2);
                      -webkit-backdrop-filter: blur(10px) saturate(1.2);
                      border: 0.5px solid ${on ? 'var(--mik-color-ventilace-border)' : 'rgba(255,255,255,0.12)'};
                      border-radius: 14px;
                      box-shadow: var(--mik-card-shadow);
                    }`;
                  ]]]
                custom_fields:
                  ico: |
                    [[[
                      const on = states['switch.ventilace_sklep']?.state === 'on';
                      return `<div style="width:20px;height:20px;display:flex;align-items:center;justify-content:center;line-height:0;${on ? 'animation:rotating 1.5s linear infinite;transform-origin:50% 50%' : ''}">
                        <ha-icon icon="mdi:fan" style="--mdc-icon-size:18px;color:${on ? 'var(--mik-color-komfort)' : 'var(--mik-text-muted)'}"></ha-icon>
                      </div>`;
                    ]]]
                  lbl: Větrání
                styles:
                  card:
                    - height: 50px
                    - padding-left: 12px
                  grid:
                    - grid-template-areas: "\"ico lbl\""
                    - grid-template-columns: 30px 1fr
                    - align-items: center
                  custom_fields:
                    lbl:
                      - font-size: 14px
                      - color: var(--mik-text-secondary)
                      - text-align: left
              - type: custom:button-card
                entity: light.svetlo_obyvak_1
