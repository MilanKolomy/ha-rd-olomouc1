# Rozvrhy topení a ventilace + plány per místnost
# Nahrát do: /config/packages/heating_schedule.yaml
#
# POZNÁMKA: Schedule helpery jsou vytvořeny přes create_schedules.py (storage mode = UI-editovatelné)
# NENASTAVOVAT je zde v YAML — YAML-definované schedule nelze editovat z UI!

# ── INPUT_SELECT: výběr plánu per místnost ────────────────────────────────────

input_select:

  topeni_plan_obyvak:
    name: "Plán topení - Obývák"
    options: [Ruční, Vlastní, Společný]
    initial: Ruční
    icon: mdi:calendar-clock

  topeni_plan_dp1:
    name: "Plán topení - Dětský pokoj 1"
    options: [Ruční, Vlastní, Společný]
    initial: Ruční
    icon: mdi:calendar-clock

  topeni_plan_dp2:
    name: "Plán topení - Dětský pokoj 2"
    options: [Ruční, Vlastní, Společný]
    initial: Ruční
    icon: mdi:calendar-clock

  topeni_plan_loznice:
    name: "Plán topení - Ložnice"
    options: [Ruční, Vlastní, Společný]
    initial: Ruční
    icon: mdi:calendar-clock

  topeni_plan_pracovna:
    name: "Plán topení - Pracovna"
    options: [Ruční, Vlastní, Společný]
    initial: Ruční
    icon: mdi:calendar-clock

  topeni_plan_koupelna_2np:
    name: "Plán topení - Koupelna 2NP"
    options: [Ruční, Vlastní, Společný]
    initial: Ruční
    icon: mdi:calendar-clock

# ── AUTOMATIONS ───────────────────────────────────────────────────────────────

automation:

  # ── Rozvrh topení: schedule změna → nastavit režim (pokud plan odpovídá) ───

  - id: topeni_schedule_obyvak
    alias: "Topení rozvrh - Obývák"
    mode: single
    trigger:
      - platform: state
        entity_id: schedule.topeni_obyvak
        id: vlastni
      - platform: state
        entity_id: schedule.topeni_spolecny
        id: spolecny
    condition:
      - condition: or
        conditions:
          - condition: and
            conditions:
              - condition: trigger
                id: vlastni
              - condition: state
                entity_id: input_select.topeni_plan_obyvak
                state: "Vlastní"
          - condition: and
            conditions:
              - condition: trigger
                id: spolecny
              - condition: state
                entity_id: input_select.topeni_plan_obyvak
                state: "Společný"
    action:
      - service: input_select.select_option
        target:
          entity_id: input_select.topeni_rezim_obyvak
        data:
          option: "{{ 'Komfort' if trigger.to_state.state == 'on' else 'Útlum' }}"

  - id: topeni_schedule_dp1
    alias: "Topení rozvrh - Dětský pokoj 1"
    mode: single
    trigger:
      - platform: state
        entity_id: schedule.topeni_dp1
        id: vlastni
      - platform: state
