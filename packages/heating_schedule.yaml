  # ── Rozvrh ventilace ────────────────────────────────────────────────────────

  - id: schedule_ventilace_sklep
    alias: "Rozvrh ventilace - Sklep"
    mode: single
    trigger:
      - platform: state
        entity_id: schedule.ventilace_sklep
    action:
      - service: "{{ 'switch.turn_on' if trigger.to_state.state == 'on' else 'switch.turn_off' }}"
