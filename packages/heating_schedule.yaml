  # ── Změna plánu: okamžitě aplikovat aktuální stav rozvrhu ─────────────────

  - id: topeni_plan_obyvak_changed
    alias: "Topení plán změněn - Obývák"
    mode: single
    trigger:
      - platform: state
        entity_id: input_select.topeni_plan_obyvak
        to: "Vlastní"
      - platform: state
        entity_id: input_select.topeni_plan_obyvak
        to: "Společný"
    action:
      - service: input_select.select_option
        target:
          entity_id: input_select.topeni_rezim_obyvak
        data:
          option: >
            {% set sched = 'schedule.topeni_obyvak' if trigger.to_state.state == 'Vlastní' else 'schedule.topeni_spolecny' %}
            {{ 'Komfort' if is_state(sched, 'on') else 'Útlum' }}

  - id: topeni_plan_dp1_changed
    alias: "Topení plán změněn - Dětský pokoj 1"
