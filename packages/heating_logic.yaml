        option: >
          {% if trigger.entity_id == 'switch.topeni_komfort_koupelna_2np' %}Komfort
          {% elif trigger.entity_id == 'switch.topeni_standby_koupelna_2np' %}Standby
          {% else %}Útlum{% endif %}

  # ── EXKLUZIVITA: spínač ON → ostatní OFF ───────────────────────────────────

  - id: topeni_obyvak_komfort_on
    trigger:
      - platform: state
        entity_id: switch.topeni_komfort_obyvak
        to: 'on'
    action:
      - service: switch.turn_off
        target:
          entity_id: [switch.topeni_standby_obyvak, switch.topeni_noc_obyvak]

  - id: topeni_obyvak_standby_on
    trigger:
      - platform: state
        entity_id: switch.topeni_standby_obyvak
        to: 'on'
    action:
      - service: switch.turn_off
        target:
          entity_id: [switch.topeni_komfort_obyvak, switch.topeni_noc_obyvak]

  - id: topeni_obyvak_noc_on
    trigger:
      - platform: state
        entity_id: switch.topeni_noc_obyvak
        to: 'on'
    action:
      - service: switch.turn_off
        target:
          entity_id: [switch.topeni_komfort_obyvak, switch.topeni_standby_obyvak]

  - id: topeni_obyvak_komfort_off
    trigger:
      - platform: state
        entity_id: switch.topeni_komfort_obyvak
        to: 'off'
    condition:
      - condition: state
        entity_id: switch.topeni_standby_obyvak
        state: 'off'
      - condition: state
        entity_id: switch.topeni_noc_obyvak
        state: 'off'
    action:
      - service: switch.turn_on
        target: {entity_id: switch.topeni_noc_obyvak}

  - id: topeni_dp1_komfort_on
