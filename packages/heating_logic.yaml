          sequence:
            - service: switch.turn_on
              target: {entity_id: switch.topeni_standby_pracovna}
            - service: switch.turn_off
              target: {entity_id: [switch.topeni_komfort_pracovna, switch.topeni_noc_pracovna]}
        - conditions: "{{ trigger.to_state.state == 'Útlum' }}"
          sequence:
            - service: switch.turn_on
              target: {entity_id: switch.topeni_noc_pracovna}
            - service: switch.turn_off
              target: {entity_id: [switch.topeni_komfort_pracovna, switch.topeni_standby_pracovna]}

  - id: topeni_sel_koupelna2np_changed
    trigger:
      - platform: state
        entity_id: input_select.topeni_rezim_koupelna_2np
    action:
      choose:
        - conditions: "{{ trigger.to_state.state == 'Komfort' }}"
          sequence:
            - service: switch.turn_on
