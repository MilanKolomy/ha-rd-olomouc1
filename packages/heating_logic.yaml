      - platform: state
        entity_id: switch.topeni_standby_dp2
        to: 'on'
      - platform: state
        entity_id: switch.topeni_noc_dp2
        to: 'on'
    action:
      service: input_select.select_option
      target: {entity_id: input_select.topeni_rezim_dp2}
      data:
        option: >
          {% if trigger.entity_id == 'switch.topeni_komfort_dp2' %}Komfort
