              target: {entity_id: switch.topeni_noc_koupelna_2np}
            - service: switch.turn_off
              target: {entity_id: [switch.topeni_komfort_koupelna_2np, switch.topeni_standby_koupelna_2np]}

  # ── ZPĚTNÁ SYNC: spínač ON → input_select ──────────────────────────────────

  - id: topeni_switch_obyvak_sync
    trigger:
      - platform: state
        entity_id: switch.topeni_komfort_obyvak
        to: 'on'
      - platform: state
        entity_id: switch.topeni_standby_obyvak
        to: 'on'
      - platform: state
        entity_id: switch.topeni_noc_obyvak
        to: 'on'
    action:
      service: input_select.select_option
      target: {entity_id: input_select.topeni_rezim_obyvak}
      data:
        option: >
          {% if trigger.entity_id == 'switch.topeni_komfort_obyvak' %}Komfort
          {% elif trigger.entity_id == 'switch.topeni_standby_obyvak' %}Standby
          {% else %}Útlum{% endif %}

  - id: topeni_switch_dp1_sync
    trigger:
      - platform: state
        entity_id: switch.topeni_komfort_dp1
        to: 'on'
      - platform: state
        entity_id: switch.topeni_standby_dp1
        to: 'on'
      - platform: state
        entity_id: switch.topeni_noc_dp1
        to: 'on'
    action:
      service: input_select.select_option
      target: {entity_id: input_select.topeni_rezim_dp1}
      data:
        option: >
          {% if trigger.entity_id == 'switch.topeni_komfort_dp1' %}Komfort
