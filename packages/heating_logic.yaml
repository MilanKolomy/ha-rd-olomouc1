              target: {entity_id: switch.topeni_standby_loznice}
            - service: switch.turn_off
              target: {entity_id: [switch.topeni_komfort_loznice, switch.topeni_noc_loznice]}
        - conditions: "{{ trigger.to_state.state == 'Útlum' }}"
          sequence:
            - service: switch.turn_on
