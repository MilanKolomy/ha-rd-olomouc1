      - platform: state
        entity_id: switch.topeni_standby_koupelna_2np
        to: 'on'
      - platform: state
        entity_id: switch.topeni_noc_koupelna_2np
        to: 'on'
    action:
      service: input_select.select_option
      target: {entity_id: input_select.topeni_rezim_koupelna_2np}
