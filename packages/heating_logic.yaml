input_select:
  topeni_rezim_obyvak:
    name: "Obývací pokoj"
    options: [Komfort, Standby, Útlum]
    initial: Útlum
    icon: mdi:sofa
  topeni_rezim_dp1:
    name: "Dětský pokoj 1"
    options: [Komfort, Standby, Útlum]
    initial: Útlum
    icon: mdi:bed
  topeni_rezim_dp2:
    name: "Dětský pokoj 2"
    options: [Komfort, Standby, Útlum]
    initial: Útlum
    icon: mdi:bed
  topeni_rezim_loznice:
    name: "Ložnice"
    options: [Komfort, Standby, Útlum]
    initial: Útlum
    icon: mdi:bed-king
  topeni_rezim_pracovna:
    name: "Pracovna"
    options: [Komfort, Standby, Útlum]
    initial: Útlum
    icon: mdi:desk-lamp
  topeni_rezim_koupelna_2np:
    name: "Koupelna 2NP"
    options: [Komfort, Standby, Útlum]
    initial: Útlum
    icon: mdi:shower

automation:

  # ── PŘEPÍNAČ: input_select → spínače ───────────────────────────────────────

  - id: topeni_sel_obyvak_changed
    trigger:
      - platform: state
        entity_id: input_select.topeni_rezim_obyvak
    action:
      choose:
        - conditions: "{{ trigger.to_state.state == 'Komfort' }}"
          sequence:
            - service: switch.turn_on
              target: {entity_id: switch.topeni_komfort_obyvak}
            - service: switch.turn_off
              target: {entity_id: [switch.topeni_standby_obyvak, switch.topeni_noc_obyvak]}
        - conditions: "{{ trigger.to_state.state == 'Standby' }}"
          sequence:
            - service: switch.turn_on
              target: {entity_id: switch.topeni_standby_obyvak}
            - service: switch.turn_off
              target: {entity_id: [switch.topeni_komfort_obyvak, switch.topeni_noc_obyvak]}
        - conditions: "{{ trigger.to_state.state == 'Útlum' }}"
          sequence:
            - service: switch.turn_on
              target: {entity_id: switch.topeni_noc_obyvak}
            - service: switch.turn_off
              target: {entity_id: [switch.topeni_komfort_obyvak, switch.topeni_standby_obyvak]}

  - id: topeni_sel_dp1_changed
    trigger:
      - platform: state
        entity_id: input_select.topeni_rezim_dp1
    action:
      choose:
        - conditions: "{{ trigger.to_state.state == 'Komfort' }}"
          sequence:
            - service: switch.turn_on
              target: {entity_id: switch.topeni_komfort_dp1}
            - service: switch.turn_off
              target: {entity_id: [switch.topeni_standby_dp1, switch.topeni_noc_dp1]}
        - conditions: "{{ trigger.to_state.state == 'Standby' }}"
          sequence:
            - service: switch.turn_on
              target: {entity_id: switch.topeni_standby_dp1}
            - service: switch.turn_off
              target: {entity_id: [switch.topeni_komfort_dp1, switch.topeni_noc_dp1]}
        - conditions: "{{ trigger.to_state.state == 'Útlum' }}"
          sequence:
            - service: switch.turn_on
              target: {entity_id: switch.topeni_noc_dp1}
            - service: switch.turn_off
              target: {entity_id: [switch.topeni_komfort_dp1, switch.topeni_standby_dp1]}

