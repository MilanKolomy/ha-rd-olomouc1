    address: "3/2/0"
    state_address: "3/2/0"
    brightness_address: "3/2/2"
    brightness_state_address: "3/2/2"

  - name: "Svetlo Obyvak Dim 2"
    address: "3/2/1"
    state_address: "3/2/1"
