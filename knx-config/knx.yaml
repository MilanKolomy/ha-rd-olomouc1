# ============================================================
# TEPLOTNÍ SENZORY (4/0/x)
# ============================================================
sensor:
  - name: "Teplota Obyvak"
    state_address: "4/0/6"
    type: temperature

  - name: "Teplota Detsky Pokoj 1"
    state_address: "4/0/7"
    type: temperature

  - name: "Teplota Detsky Pokoj 2"
    state_address: "4/0/2"
    type: temperature

  - name: "Teplota Loznice"
    state_address: "4/0/3"
    type: temperature

  - name: "Teplota Pracovna"
    state_address: "4/0/4"
    type: temperature

  - name: "Teplota Koupelna 2NP"
    state_address: "4/0/5"
    type: temperature

# ============================================================
# TOPENÍ - REŽIMY (switch, 1-bit)
# Komfort = 4/1/x, Standby = 4/2/x, Noc/Útlum = 4/3/x
# ============================================================
switch:
  # Komfort
  - name: "Topeni Komfort Obyvak"
    address: "4/1/0"
    state_address: "4/1/0"

  - name: "Topeni Komfort DP1"
    address: "4/1/1"
    state_address: "4/1/1"

  - name: "Topeni Komfort DP2"
    address: "4/1/2"
    state_address: "4/1/2"

  - name: "Topeni Komfort Loznice"
    address: "4/1/3"
    state_address: "4/1/3"

  - name: "Topeni Komfort Pracovna"
    address: "4/1/4"
    state_address: "4/1/4"

  - name: "Topeni Komfort Koupelna 2NP"
    address: "4/1/5"
    state_address: "4/1/5"

  # Standby
  - name: "Topeni Standby Obyvak"
    address: "4/2/0"
    state_address: "4/2/0"

  - name: "Topeni Standby DP1"
    address: "4/2/1"
    state_address: "4/2/1"

  - name: "Topeni Standby DP2"
    address: "4/2/2"
    state_address: "4/2/2"

  - name: "Topeni Standby Loznice"
    address: "4/2/3"
    state_address: "4/2/3"

  - name: "Topeni Standby Pracovna"
    address: "4/2/4"
    state_address: "4/2/4"

  - name: "Topeni Standby Koupelna 2NP"
    address: "4/2/5"
    state_address: "4/2/5"

  # Noc / Útlum
  - name: "Topeni Noc Obyvak"
    address: "4/3/0"
    state_address: "4/3/0"

  - name: "Topeni Noc DP1"
    address: "4/3/1"
    state_address: "4/3/1"

  - name: "Topeni Noc DP2"
    address: "4/3/2"
    state_address: "4/3/2"

  - name: "Topeni Noc Loznice"
    address: "4/3/3"
    state_address: "4/3/3"

  - name: "Topeni Noc Pracovna"
    address: "4/3/4"
    state_address: "4/3/4"

  - name: "Topeni Noc Koupelna 2NP"
    address: "4/3/5"
    state_address: "4/3/5"

  # Topení / Klimatizace přepínač (1=Topení, 0=Klima)
  - name: "Rezim Topeni DP1"
    address: "4/5/0"
    state_address: "4/5/0"

  - name: "Rezim Topeni DP2"
    address: "4/5/2"
    state_address: "4/5/2"

  - name: "Rezim Topeni Pracovna"
    address: "4/5/4"
    state_address: "4/5/4"

  - name: "Rezim Topeni Loznice"
    address: "4/5/6"
    state_address: "4/5/6"

  # Ventilace (switch)
  - name: "Ventilace Sklep"
    address: "3/3/1"
    state_address: "3/3/1"

  - name: "Ventilace Koupelna 1NP"
    address: "3/3/0"
    state_address: "3/3/0"

