# KNX Entity Configuration
# Tento soubor patří do configuration.yaml jako: knx: !include knx-config/knx.yaml
# KNX/IP Router - autodiscovery (přidat KNX integraci přes UI: Nastavení → Integrace → KNX)

# ============================================================
